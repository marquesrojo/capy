<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Templates QR — Capy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #E8772A;
    --bg: #1A1A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e5e5e5; font-family: 'Inter', sans-serif; padding: 40px 20px; }
  h2 { font-size: 13px; font-weight: 600; color: #666; letter-spacing: 0.1em; text-transform: uppercase; margin: 40px 0 16px; text-align: center; }

  .a4 {
    width: 210mm; height: 297mm;
    background: var(--bg);
    margin: 0 auto;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden; border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .a4::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 30%, var(--accent-10) 0%, transparent 70%);
  }
  .a4::after {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .a4-content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    padding: 60px; width: 100%;
  }

  .resto-logo {
    width: 160px; height: 160px; border-radius: 36px;
    background: var(--accent-15); border: 2px solid var(--accent-30);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px; overflow: hidden;
  }
  .resto-logo img { width: 100%; height: 100%; object-fit: cover; }
  .resto-logo-placeholder { font-size: 13px; font-weight: 600; color: var(--accent-60); text-align: center; }

  .resto-name { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: var(--accent); letter-spacing: 0.08em; text-align: center; margin-bottom: 40px; line-height: 1; }

  .divider { width: 48px; height: 2px; background: var(--accent); border-radius: 2px; margin-bottom: 48px; }

  .qr-a4-wrap {
    background: #F5F0EB; border-radius: 24px; padding: 28px; margin-bottom: 48px;
    box-shadow: 0 0 0 1px var(--accent-20), 0 20px 60px rgba(0,0,0,0.4);
  }
  #qr-a4 canvas, #qr-a4 img { display: block; width: 240px !important; height: 240px !important; }

  .invite-text {
    font-size: 19px; font-weight: 500; color: var(--accent);
    text-align: center; line-height: 1.5; max-width: 420px; margin-bottom: 48px;
  }
  .invite-text strong { color: var(--accent); font-weight: 700; }

  .divider-bottom { width: 100%; height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 32px; }

  .powered { display: flex; align-items: center; gap: 8px; }
  .powered-text { font-size: 10px; color: rgba(245,240,235,0.2); letter-spacing: 0.12em; text-transform: uppercase; }
  .powered-logo { width: 20px; height: 20px; border-radius: 5px; overflow: hidden; opacity: 0.4; }
  .powered-logo img { width: 100%; height: 100%; object-fit: cover; }
  .powered-brand { font-size: 12px; font-weight: 700; color: var(--accent-50); letter-spacing: 0.15em; text-transform: uppercase; }

  /* 5x10 */
  .small-wrap { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
  .small {
    width: 56.7mm; height: 113.4mm;
    background: var(--accent); border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    position: relative; overflow: hidden;
  }
  .small::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .small::after { content: ''; position: absolute; bottom: -20px; left: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(0,0,0,0.08); }
  .small-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: white; letter-spacing: 0.1em; text-align: center; margin-bottom: 14px; position: relative; z-index: 1; line-height: 1.1; }
  .qr-small-wrap { background: white; border-radius: 12px; padding: 10px; margin-bottom: 14px; position: relative; z-index: 1; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  #qr-small canvas, #qr-small img { display: block; width: 110px !important; height: 110px !important; }
  .small-url { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; text-align: center; position: relative; z-index: 1; }
  .small-powered { font-size: 7px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 10px; position: relative; z-index: 1; }

  @media print {
    body { background: white; padding: 0; }
    h2 { display: none; }
    .a4 { box-shadow: none; border-radius: 0; page-break-after: always; break-after: page; }
    .small { box-shadow: none; }
  }
</style>
</head>
<body>

<h2>Template A4 — Para imprimir y colgar</h2>

<div class="a4">
  <div class="a4-content">
    <div class="resto-logo" id="resto-logo-wrap">
      <div class="resto-logo-placeholder">LOGO</div>
    </div>
    <div class="resto-name" id="resto-name">Cargando...</div>
    <div class="divider"></div>
    <div class="qr-a4-wrap">
      <div id="qr-a4"></div>
    </div>
    <div class="invite-text">
      Escaneá y viví tu experiencia<br>
      en <strong id="invite-venue-name"></strong>
    </div>
    <div class="divider-bottom"></div>
    <div class="powered">
      <span class="powered-text">Powered by</span>
      <div class="powered-logo">
        <img src="https://ycgptakgpsvmstoftkdk.supabase.co/storage/v1/object/public/icons/icon-192.png" onerror="this.style.display='none'" />
      </div>
      <span class="powered-brand">Capy</span>
    </div>
  </div>
</div>

<h2>Template 5×10 cm — Para pegar en las mesas</h2>

<div class="small-wrap">
  <div class="small">
    <div class="small-title">PEDÍ<br>DESDE ACÁ</div>
    <div class="qr-small-wrap">
      <div id="qr-small"></div>
    </div>
    <div class="small-url" id="small-url">capyapp.co</div>
    <div class="small-powered">Powered by Capy</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ycgptakgpsvmstoftkdk.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljZ3B0YWtncHN2bXN0b2Z0a2RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDcyMTMsImV4cCI6MjA5NzI4MzIxM30.-71ZglbJfVLXhN4NtWivs8E7flb2QN_H7Gc4lwgpcIY'
const FALLBACK_VENUE_ID = '00000000-0000-0000-0000-000000000001'

const params = new URLSearchParams(window.location.search)
const VENUE_ID = params.get('venue') || FALLBACK_VENUE_ID

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function hexToRgb(hex) {
  hex = hex.replace('#', '')
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('')
  const r = parseInt(hex.slice(0, 2), 16)
  const g = parseInt(hex.slice(2, 4), 16)
  const b = parseInt(hex.slice(4, 6), 16)
  return `${r},${g},${b}`
}

function applyColors(accent, bg) {
  const root = document.documentElement
  const rgb = hexToRgb(accent)
  root.style.setProperty('--accent', accent)
  root.style.setProperty('--bg', bg)
  root.style.setProperty('--accent-10', `rgba(${rgb},0.10)`)
  root.style.setProperty('--accent-15', `rgba(${rgb},0.15)`)
  root.style.setProperty('--accent-20', `rgba(${rgb},0.20)`)
  root.style.setProperty('--accent-30', `rgba(${rgb},0.30)`)
  root.style.setProperty('--accent-50', `rgba(${rgb},0.50)`)
  root.style.setProperty('--accent-60', `rgba(${rgb},0.60)`)
}

async function loadVenue() {
  const { data } = await db
    .from('venues')
    .select('name, logo_url, header_bg_color, header_text_color, slug')
    .eq('id', VENUE_ID)
    .single()

  if (!data) return

  // Apply venue colors
  const accent = data.header_text_color || '#E8772A'
  const bg = data.header_bg_color || '#1A1A1A'
  applyColors(accent, bg)

  // Venue name
  const venueName = data.name || 'Mi Restaurante'
  document.getElementById('resto-name').textContent = venueName
  document.getElementById('invite-venue-name').textContent = venueName

  // Logo
  if (data.logo_url) {
    const wrap = document.getElementById('resto-logo-wrap')
    wrap.innerHTML = `<img src="${data.logo_url}" alt="Logo" />`
  }

  // QR URL based on venue slug
  const clientUrl = data.slug
    ? `https://capyapp.co/r/${data.slug}`
    : 'https://capyapp.co'

  // Update small url label
  const shortUrl = data.slug ? `capyapp.co/r/${data.slug}` : 'capyapp.co'
  document.getElementById('small-url').textContent = shortUrl

  // Generate QR codes now that we have the URL
  new QRCode(document.getElementById('qr-a4'), {
    text: clientUrl,
    width: 240, height: 240,
    colorDark: '#1A1A1A', colorLight: '#F5F0EB',
    correctLevel: QRCode.CorrectLevel.H
  })

  new QRCode(document.getElementById('qr-small'), {
    text: clientUrl,
    width: 110, height: 110,
    colorDark: '#1A1A1A', colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.H
  })
}

loadVenue()
</script>
</body>
</html>
